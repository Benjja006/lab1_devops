version: '3.8'
services:
  frontend:
    image: benjja006/tienda-frontend:latest
    build: ./frontend
    ports:
      - "3000:3000"
    restart: always
  backend:
    image: benjja006/tienda-backend:latest
    build: ./backend
    ports:
      - "3001:3001"
    restart: always
  db:
    image: benjja006/tienda-db:latest
    build: ./db
    ports:
      - "3306:3306"
    restart: always 

